services:

  app:
    build: .
    container_name: harmoniq-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/harmoniq
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: mypassword

    volumes:
      - ./uploads:/app/uploads      # <-- Add this

  postgres:
    image: postgres:17
    container_name: harmoniq-postgres

    environment:
      POSTGRES_DB: harmoniq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: harmoniq-redis

    command: redis-server --requirepass mypassword

    ports:
      - "6379:6379"

volumes:
  postgres_data: